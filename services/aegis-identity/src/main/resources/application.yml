spring:
  application:
    name: aegis-identity
  
  # Database (PostgreSQL — local Docker)
  datasource:
    url: jdbc:postgresql://localhost:5432/aegis_identity
    username: ${DB_USERNAME:aegis}
    password: ${DB_PASSWORD:aegis_dev_postgres}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
  # SSL disabled for local dev
  ssl:
    enabled: false

# AegisComms Identity Configuration
aegis:
  identity:
    ca:
      root-cert-path: ${CA_ROOT_CERT:}
      intermediate-cert-path: ${CA_INTERMEDIATE_CERT:}
      intermediate-key-path: ${CA_INTERMEDIATE_KEY:}
    device:
      max-devices-per-user: 5
      certificate-validity-days: 365
      require-hardware-attestation: false
    auth:
      totp-enabled: false
      session-timeout-minutes: 60
      max-failed-attempts: 10
      lockout-duration-minutes: 5

# gRPC Server
grpc:
  server:
    port: 9091

# Logging
logging:
  level:
    com.aegiscomms: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
