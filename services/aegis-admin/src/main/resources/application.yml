spring:
  application:
    name: aegis-admin

  datasource:
    url: jdbc:postgresql://localhost:5432/aegis_admin
    username: ${DB_USERNAME:aegis}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: 8082
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${KEYSTORE_PASSWORD:}
    key-store-type: PKCS12
    client-auth: need

# Admin Configuration
aegis:
  admin:
    # Governance
    dual-control-required: true
    max-admin-session-minutes: 30
    require-mfa: true
    
    # Audit
    audit:
      immutable: true
      retention-days: 2555  # 7 years
      export-enabled: true
    
    # Remote Wipe
    wipe:
      require-dual-approval: true
      confirmation-timeout-seconds: 300

# Actuator (Health/Metrics)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

grpc:
  server:
    port: 9092

logging:
  level:
    com.aegiscomms: DEBUG
