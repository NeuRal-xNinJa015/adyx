# Adyx — Local Development Infrastructure
# All data is encrypted at rest. No plaintext anywhere.

services:
  # ============================================================
  # Redis — Message Cache (Short TTL)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-aegis_dev_redis} --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - aegis-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aegis_dev_redis}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Cassandra — Encrypted Blob Storage
  # ============================================================
  cassandra:
    image: cassandra:5.0
    container_name: aegis-cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=AegisCluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=200M
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - aegis-net
    healthcheck:
      test: [ "CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ============================================================
  # Kafka + Zookeeper — Event Layer (Delivery Guarantees)
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: aegis-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper
    networks:
      - aegis-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: aegis-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168 # 7 days
      KAFKA_LOG_RETENTION_BYTES: 1073741824 # 1 GB
    volumes:
      - kafka-data:/var/lib/kafka
    networks:
      - aegis-net
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ============================================================
  # PostgreSQL — Metadata Store (Identity, Admin)
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_postgres}
      POSTGRES_DB: aegis_identity
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/docker/init-db:/docker-entrypoint-initdb.d
    networks:
      - aegis-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Vault — Secrets Management
  # ============================================================
  vault:
    image: hashicorp/vault:1.17
    container_name: aegis-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-aegis-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - aegis-net
    healthcheck:
      test: [ "CMD", "vault", "status", "-address=http://127.0.0.1:8200" ]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================
# Volumes — Persistent Data
# ============================================================
volumes:
  redis-data:
    driver: local
  cassandra-data:
    driver: local
  kafka-data:
    driver: local
  zookeeper-data:
    driver: local
  postgres-data:
    driver: local

# ============================================================
# Network — Internal Communication
# ============================================================
networks:
  aegis-net:
    driver: bridge
    name: aegis-network
